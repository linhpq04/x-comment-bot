services:
  app:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME:latest
    container_name: comment-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./twitter-cookies.json:/app/twitter-cookies.json:ro
    ports:
      - "3000:3000"
    user: "0:0"
